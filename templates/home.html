{{define "content"}}
<main class="flex-grow z-10 flex flex-col items-center">
    <section class="w-full min-h-[90vh] flex flex-col justify-center items-center px-4 relative pt-[100px]">
        <div class="relative z-10 w-full max-w-[1200px] flex flex-col items-center text-center">
            <h1 class="text-5xl md:text-6xl font-black text-primary mb-8 max-w-4xl tracking-tighter" style="font-family: 'Playfair Display', serif;">
                Reality is More Terrifying Than Fiction
            </h1>
            <form method="GET" action="/search" class="w-full max-w-2xl relative group">
                <span class="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-outline-variant">search</span>
                <input type="text" name="q" class="w-full py-4 pl-12 pr-4 bg-transparent border-b-2 border-outline-variant text-on-surface text-lg text-center focus:outline-none focus:border-primary transition-colors" placeholder="Search for a film to uncover the truth..." required/>
            </form>
        </div>
    </section>
    <section class="w-full max-w-[1200px] px-4 py-20 flex flex-col gap-12 z-10">
        <div class="flex items-center justify-between border-b border-surface-container-highest pb-3">
            <h2 class="text-3xl font-bold text-on-surface" style="font-family: 'Playfair Display', serif;">Choose Your Nightmare</h2>
            <a href="/movies" class="text-sm font-bold uppercase tracking-wider text-primary hover:opacity-80 no-underline">View All</a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="/filter?category=русский" class="glass-card rounded-lg overflow-hidden flex flex-col group no-underline">
                <div class="h-80 relative overflow-hidden">
                    <img src="/static/images/russian_movies.png" alt="Russian Horror" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-700"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#1a1a1a] to-transparent"></div>
                    <div class="absolute top-4 left-4 tag-chip rounded">[RUSSIAN]</div>
                </div>
                <div class="p-6 flex flex-col gap-3 flex-grow">
                    <h3 class="text-2xl font-bold text-primary" style="font-family: 'Playfair Display', serif;">Russian Horror</h3>
                    <p class="text-on-surface-variant flex-grow">Homegrown terror from the depths of the motherland.</p>
                </div>
            </a>
            <a href="/filter?category=зарубежный" class="glass-card rounded-lg overflow-hidden flex flex-col group no-underline">
                <div class="h-80 relative overflow-hidden">
                    <img src="/static/images/foreign_movies.png" alt="Foreign Horror" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-700"/>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#1a1a1a] to-transparent"></div>
                    <div class="absolute top-4 left-4 tag-chip rounded">[FOREIGN]</div>
                </div>
                <div class="p-6 flex flex-col gap-3 flex-grow">
                    <h3 class="text-2xl font-bold text-primary" style="font-family: 'Playfair Display', serif;">Foreign Horror</h3>
                    <p class="text-on-surface-variant flex-grow">Worldwide nightmares rooted in true events.</p>
                </div>
            </a>
        </div>
    </section>
</main>
{{end}}
