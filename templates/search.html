{{define "content"}}
<main class="flex-grow w-full max-w-[1200px] mx-auto px-4 md:px-8 py-12 flex flex-col md:flex-row gap-8 relative z-10">
    <aside class="w-full md:w-1/3 flex flex-col gap-6">
        <div class="glass-card rounded-lg p-2">
            <div class="w-full aspect-[2/3] bg-surface-container flex items-center justify-center">
                <span class="material-symbols-outlined text-8xl text-outline-variant">movie</span>
            </div>
        </div>
        <div class="flex flex-wrap gap-2">
            <span class="tag-chip">[{{.Category}}]</span>
            <span class="tag-chip">[{{.Year}}]</span>
        </div>
    </aside>
    <section class="w-full md:w-2/3 flex flex-col gap-8">
        <div class="border-b border-outline-variant/20 pb-6">
            <h1 class="text-5xl font-black text-primary mb-2" style="font-family: 'Playfair Display', serif;">{{.MovieTitle}}</h1>
            <p class="text-on-surface-variant text-lg italic">Year: {{.Year}}</p>
        </div>
        <div>
            <h2 class="text-2xl font-bold text-secondary mb-4" style="font-family: 'Playfair Display', serif;">The Story</h2>
            <p class="text-on-surface-variant text-lg leading-relaxed">{{.About}}</p>
        </div>
        <div class="glass-card rounded-lg p-8 relative overflow-hidden" style="border-left: 3px solid #c8c6c5;">
            <h2 class="text-2xl font-bold text-secondary mb-4 flex items-center gap-2" style="font-family: 'Playfair Display', serif;">
                <span class="material-symbols-outlined">menu_book</span> The Real Story
            </h2>
            <p class="text-on-surface-variant text-lg leading-relaxed">{{.Facts}}</p>
        </div>
        <div class="flex gap-4 mt-4">
            <a href="/" class="inline-flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-3 rounded text-sm font-bold uppercase tracking-wider no-underline">New Search</a>
            <a href="/movies" class="inline-flex items-center gap-2 border border-outline-variant text-on-surface-variant px-6 py-3 rounded text-sm font-bold uppercase tracking-wider no-underline">All Files</a>
        </div>
    </section>
</main>
{{end}}
