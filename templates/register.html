{{define "content"}}
<main class="flex-grow flex items-center justify-center z-10 px-4">
    <div class="glass-card rounded-lg p-12 max-w-md w-full">
        <h1 class="text-4xl font-black text-primary mb-8 text-center" style="font-family: 'Playfair Display', serif;">Join the Archive</h1>
        <form method="POST" action="/register" class="flex flex-col gap-4">
            <input type="text" name="username" placeholder="Username" required class="w-full py-3 px-4 bg-surface-container border border-outline-variant text-on-surface rounded text-center focus:outline-none focus:border-primary"/>
            <input type="email" name="email" placeholder="Email" required class="w-full py-3 px-4 bg-surface-container border border-outline-variant text-on-surface rounded text-center focus:outline-none focus:border-primary"/>
            <input type="password" name="password" placeholder="Password" required class="w-full py-3 px-4 bg-surface-container border border-outline-variant text-on-surface rounded text-center focus:outline-none focus:border-primary"/>
            <button type="submit" class="w-full bg-primary-container text-on-primary-container py-3 rounded text-sm font-bold uppercase tracking-wider hover:opacity-90">Register</button>
        </form>
        <p class="text-on-surface-variant text-sm text-center mt-6">Already registered? <a href="/login" class="text-primary hover:underline">Sign in</a></p>
    </div>
</main>
{{end}}
